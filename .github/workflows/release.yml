name: Release
on:
  workflow_dispatch:
permissions:
  contents: write
  pages: write
  id-token: write
jobs:
  release:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/configure-pages@v5
      - uses: actions/cache@v4
        with:
          path: build/
          key: ${{ runner.os }}-xcodebuild-${{ hashFiles('**/*.swift', '**/*.pbxproj') }}
          restore-keys: |
            ${{ runner.os }}-xcodebuild-
      - name: Setup git-cliff
        run: |
          curl -L -O https://github.com/orhun/git-cliff/releases/download/v2.12.0/git-cliff-2.12.0-aarch64-apple-darwin.tar.gz
          tar -xf git-cliff-2.12.0-aarch64-apple-darwin.tar.gz --strip-components=1 -C /usr/local/bin "git-cliff-*/git-cliff"
          chmod +x /usr/local/bin/git-cliff

      - name: Calculate next version
        id: calculate_version
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0)
          NEXT_VERSION=$(git-cliff --bumped-version)

          echo "Latest tag: $LATEST_TAG, Next version: $NEXT_VERSION"
          echo "version=$NEXT_VERSION" >> $GITHUB_OUTPUT
          if [ "$NEXT_VERSION" == "$LATEST_TAG" ]; then
            echo "Version $NEXT_VERSION already exists."
            exit 1
          fi

      - name: Update version
        run: |
          CURRENT_PROJECT_VERSION=$(grep 'CURRENT_PROJECT_VERSION' Config.xcconfig | head -1 | sed 's/.*= //;s/;//')
          MARKETING_VERSION=$(grep 'MARKETING_VERSION' Config.xcconfig | head -1 | sed 's/.*= //;s/;//')

          if [ "$MARKETING_VERSION" == "${{ steps.calculate_version.outputs.version }}" ]; then
            echo "Version $MARKETING_VERSION already exists."
            exit 1
          fi

          sed -i '' "s/MARKETING_VERSION = .*/MARKETING_VERSION = ${{ steps.calculate_version.outputs.version }}/" Config.xcconfig
          sed -i '' "s/CURRENT_PROJECT_VERSION = .*/CURRENT_PROJECT_VERSION = $(($CURRENT_PROJECT_VERSION + 1))/" Config.xcconfig
      - name: Build
        run: |
          xcodebuild -scheme Uljika -configuration Release -derivedDataPath build CODE_SIGN_IDENTITY="-" CODE_SIGNING_REQUIRED=YES CODE_SIGNING_ALLOWED=YES
      - name: Package
        run: |
          ditto -c -k --keepParent build/Build/Products/Release/Uljika.app Uljika-${{ steps.calculate_version.outputs.version }}.zip
          mkdir release-assets
          mv Uljika-${{ steps.calculate_version.outputs.version }}.zip release-assets/

      - name: Generate release notes
        run: |
          git-cliff --unreleased > release-notes.md
      - name: Generate appcast.xml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -L -O https://github.com/sparkle-project/Sparkle/releases/download/2.6.4/Sparkle-2.6.4.tar.xz
          mkdir sparkle
          tar -xf Sparkle-2.6.4.tar.xz -C sparkle

          gh api --method POST -H "Accept: application/vnd.github+json" /markdown -F text=@release-notes.md > release-assets/Uljika-${{ steps.calculate_version.outputs.version }}.html

          echo "${{ secrets.SPARKLE_PRIVATE_KEY }}" | ./sparkle/bin/generate_appcast \
            --ed-key-file - \
            --download-url-prefix "https://github.com/${{ github.repository }}/releases/download/${{ steps.calculate_version.outputs.version }}/" \
            --release-notes-url-prefix "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/" \
            release-assets/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Uljika ${{ steps.calculate_version.outputs.version }}
          files: release-assets/Uljika-${{ steps.calculate_version.outputs.version }}.zip
          tag_name: ${{ steps.calculate_version.outputs.version }}
          body_path: release-notes.md

      - name: Prepare for GitHub Pages
        run: |
          mkdir gh-pages
          cp release-assets/appcast.xml gh-pages/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "gh-pages"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Commit updated versions
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add Config.xcconfig
          git diff --quiet && git diff --staged --quiet || git commit -m "chore(release): update version to ${{ steps.calculate_version.outputs.version }}"
          git push
